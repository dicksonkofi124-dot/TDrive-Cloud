name: "Publish"
on:
  push:
    branches:
      - main

jobs:
  publish-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            arch: x86_64
          - platform: ubuntu-22.04
            args: ''
            arch: x86_64
          - platform: macos-latest
            args: ''
            arch: arm64
          - platform: macos-latest
            args: ''
            arch: x86_64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: install frontend dependencies
        working-directory: app
        run: npm install
      - name: build desktop apps
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARCH: ${{ matrix.arch }}
        with:
          tagName: app-v__VERSION__ 
          releaseName: 'App v__VERSION__'
          releaseDraft: true
          projectPath: ./app

  publish-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Rust Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - name: install frontend dependencies
        working-directory: app
        run: npm install
      - name: init android project
        working-directory: app
        run: npx tauri android init
      - name: build android app
        working-directory: app
        run: npx tauri android build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust iOS Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: install frontend dependencies
        working-directory: app
        run: npm install
      - name: init ios project
        working-directory: app
        run: npx tauri ios init
      - name: build ios app
        working-directory: app
        run: npx tauri ios build -- --no-bundle CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
