name: "Publish"
on:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (Standard x64)
          - platform: windows-latest
            args: ''
          
          # Linux (Ubuntu x64)
          - platform: ubuntu-22.04
            args: ''
            
          # macOS (Apple Silicon / ARM64 Desktop)
          - platform: macos-latest
            args: ''

          # Android Build (Runs on Linux, compiles APK)
          - platform: ubuntu-22.04
            args: '--target android'

          # iOS Build (Runs on Mac cloud, compiles IPA)
          - platform: macos-latest
            args: '--target ios'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (Required for Android compile)
        if: matrix.args == '--target android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Required for Android compile)
        if: matrix.args == '--target android'
        uses: android-actions/setup-android@v3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-apple-darwin
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-msvc
            aarch64-linux-android
            armv7-linux-android
            i686-linux-android
            x86_64-linux-android
            aarch64-apple-ios
            x86_64-apple-ios
            aarch64-apple-ios-sim

      - name: install dependencies (ubuntu Linux desktop only)
        if: matrix.platform == 'ubuntu-22.04' && matrix.args != '--target android'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: install frontend dependencies
        working-directory: app
        run: npm install

      - name: build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ 
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          projectPath: ./app
          args: ${{ matrix.args }}
